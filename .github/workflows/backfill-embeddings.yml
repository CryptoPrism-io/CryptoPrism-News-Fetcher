name: Backfill Neural Embeddings

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Which embeddings to backfill'
        required: true
        type: choice
        options:
          - tcn
          - lstm
          - both

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install hmmlearn

      - name: Create .env file
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" > .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_BACKTEST_NAME=cp_backtest" >> .env
          SSLMODE="${{ secrets.DB_SSLMODE }}"
          [ -n "$SSLMODE" ] && echo "DB_SSLMODE=$SSLMODE" >> .env || true

      - uses: actions/cache/restore@v4
        with:
          path: artifacts/
          key: ensemble-artifacts-
          restore-keys: ensemble-artifacts-

      - name: Run embedding backfill
        run: python -m src.inference.backfill_embeddings --model ${{ github.event.inputs.model }}

      - name: Report status
        if: always()
        run: |
          python -c "
          from dotenv import load_dotenv; load_dotenv()
          import os, psycopg2
          conn = psycopg2.connect(host=os.environ['DB_HOST'], port='5432',
              dbname='cp_backtest', user=os.environ['DB_USER'],
              password=os.environ['DB_PASSWORD'], sslmode=os.environ.get('DB_SSLMODE','require'))
          cur = conn.cursor()
          for tbl in ['ML_LSTM_EMBEDDINGS', 'ML_TCN_EMBEDDINGS']:
              try:
                  cur.execute(f'SELECT COUNT(*), COUNT(DISTINCT slug) FROM \"{tbl}\"')
                  r = cur.fetchone()
                  print(f'{tbl}: {r[0]:,} rows, {r[1]} coins')
              except: print(f'{tbl}: not found'); conn.rollback()
          conn.close()
          "

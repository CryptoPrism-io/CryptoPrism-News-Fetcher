name: Expand News Coverage

on:
  workflow_dispatch:

jobs:
  expand:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" > .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          SSLMODE="${{ secrets.DB_SSLMODE }}"
          [ -n "$SSLMODE" ] && echo "DB_SSLMODE=$SSLMODE" >> .env || true

      - name: Step 1 — Re-map coins with expanded mapper
        run: python -m src.nlp.remap_coins

      - name: Step 2 — Regenerate FE_NEWS_SIGNALS
        run: python -m src.features.news_signals

      - name: Step 3 — Regenerate FE_NEWS_EVENTS
        run: python -m src.features.news_events --backfill

      - name: Report status
        if: always()
        run: |
          python -c "
          from dotenv import load_dotenv; load_dotenv()
          import os, psycopg2
          conn = psycopg2.connect(host=os.environ['DB_HOST'], port='5432',
              dbname=os.environ['DB_NAME'], user=os.environ['DB_USER'],
              password=os.environ['DB_PASSWORD'], sslmode=os.environ.get('DB_SSLMODE','require'))
          cur = conn.cursor()
          cur.execute('SELECT COUNT(DISTINCT UNNEST(coins_mentioned)) FROM \"FE_NEWS_SENTIMENT\"')
          print(f'Unique coins in FE_NEWS_SENTIMENT: {cur.fetchone()[0]}')
          cur.execute('SELECT COUNT(*), COUNT(DISTINCT slug) FROM \"FE_NEWS_SIGNALS\"')
          r = cur.fetchone()
          print(f'FE_NEWS_SIGNALS: {r[0]:,} rows, {r[1]} coins')
          cur.execute('SELECT COUNT(*), COUNT(DISTINCT slug) FROM \"FE_NEWS_EVENTS\"')
          r = cur.fetchone()
          print(f'FE_NEWS_EVENTS: {r[0]:,} rows, {r[1]} coins')
          conn.close()
          "

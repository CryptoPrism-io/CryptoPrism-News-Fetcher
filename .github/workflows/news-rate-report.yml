name: News Ingest Rate Report

# Daily digest: how many articles we're fetching, hourly rate, and how that
# compares to the legacy CoinDesk baseline. Read-only against cc_news.
on:
  schedule:
    # 06:30 UTC = 12:00 IST
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install "psycopg2-binary>=2.9"
      - name: Generate report
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
        run: python scripts/news_rate_report.py | tee $GITHUB_STEP_SUMMARY

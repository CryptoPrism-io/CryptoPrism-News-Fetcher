name: "Phase 4 — Backfill dbcp news/ML tables GCP → RDS"

# ONE-OFF migration helper (CryptoPrism GCP→AWS migration, Phase 4).
# Copies the 13 News-Fetcher-owned `dbcp` tables from GCP Cloud SQL (source,
# read via the existing DB_* secrets) into AWS RDS (dest, RDS_* secrets) so the
# News writer can be repointed to RDS without losing history.
#
# SAFE BY DEFAULT: dry_run=true only reports row counts on both sides.
# Set dry_run=false AND confirm=BACKFILL to actually TRUNCATE+COPY each table.
# Must run BEFORE the DB_* secrets are repointed to RDS (source guard enforces
# source != dest). GCP stays the intact rollback corpus.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type BACKFILL to authorize writes (ignored when dry_run=true)'
        required: false
        default: ''
      dry_run:
        description: 'true = report counts only; false = TRUNCATE+COPY into RDS'
        required: true
        default: 'true'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Install PostgreSQL 16 client
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-16
          psql --version && pg_dump --version

      - name: Backfill (truncate + data-only copy, per table)
        env:
          # SOURCE = GCP (still pointed there until repoint)
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          # DEST = AWS RDS
          RDS_HOST: ${{ secrets.RDS_HOST }}
          RDS_USER: ${{ secrets.RDS_USER }}
          RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          set -uo pipefail
          export PGCONNECT_TIMEOUT=30

          # 13 News-Fetcher-owned dbcp tables (verified writer topology 2026-06-28)
          TABLES=( \
            cc_news \
            FE_NEWS_SENTIMENT FE_NEWS_SIGNALS FE_NEWS_EVENTS \
            ML_LABELS ML_SIGNALS ML_SIGNALS_V2 ML_REGIME \
            ML_MODEL_REGISTRY ML_BACKTEST_RESULTS ML_TRADES \
            etl_runs etl_job_stats )

          src() { PGPASSWORD="$DB_PASSWORD" PGSSLMODE=prefer psql -h "$DB_HOST" -p "${DB_PORT:-5432}" -U "$DB_USER" -d "$DB_NAME" -tAq "$@"; }
          dst() { PGPASSWORD="$RDS_PASSWORD" PGSSLMODE=require psql -h "$RDS_HOST" -p 5432 -U "$RDS_USER" -d dbcp -tAq "$@"; }
          dump() { PGPASSWORD="$DB_PASSWORD" PGSSLMODE=prefer pg_dump -h "$DB_HOST" -p "${DB_PORT:-5432}" -U "$DB_USER" -d "$DB_NAME" "$@"; }

          # --- guards ---------------------------------------------------------
          if [ -z "${RDS_HOST:-}" ] || [ -z "${RDS_USER:-}" ] || [ -z "${RDS_PASSWORD:-}" ]; then
            echo "::error::RDS_HOST / RDS_USER / RDS_PASSWORD secrets are not all set"; exit 1; fi
          if [ "$DB_HOST" = "$RDS_HOST" ]; then
            echo "::error::source host == dest host ($DB_HOST). Secrets already repointed? Aborting."; exit 1; fi

          echo "SOURCE (GCP): $DB_HOST/$DB_NAME   DEST (RDS): $RDS_HOST/dbcp"
          echo "src server: $(src -c 'select version();' | head -1)"
          echo "dst server: $(dst -c 'select version();' | head -1)"

          WRITE=0
          if [ "${DRY_RUN}" = "false" ]; then
            if [ "${CONFIRM}" = "BACKFILL" ]; then WRITE=1; else
              echo "::error::dry_run=false requires confirm=BACKFILL"; exit 1; fi
          fi
          echo "MODE: $([ "$WRITE" = "1" ] && echo 'LIVE WRITE (truncate+copy)' || echo 'DRY RUN (counts only)')"
          echo

          printf '%-22s | %12s | %12s | %12s\n' "table" "gcp_rows" "rds_before" "rds_after"
          printf -- '-%.0s' {1..72}; echo
          FAIL=0
          for tbl in "${TABLES[@]}"; do
            gcp=$(src -c "SELECT COUNT(*) FROM \"$tbl\";" 2>/dev/null || echo "ERR")
            exists=$(dst -c "SELECT to_regclass('public.\"$tbl\"') IS NOT NULL;" 2>/dev/null || echo "f")
            if [ "$exists" != "t" ]; then
              printf '%-22s | %12s | %12s | %12s\n' "$tbl" "$gcp" "MISSING" "-"
              echo "::warning::$tbl absent on RDS — skipped (seed expected it to exist)"; FAIL=1; continue
            fi
            before=$(dst -c "SELECT COUNT(*) FROM \"$tbl\";" 2>/dev/null || echo "ERR")
            after="$before"
            if [ "$WRITE" = "1" ]; then
              dst -v ON_ERROR_STOP=1 -c "TRUNCATE TABLE \"$tbl\";" || { echo "::error::truncate failed $tbl"; FAIL=1; continue; }
              if ! dump --data-only --no-owner --no-privileges -t "public.\"$tbl\"" | dst -v ON_ERROR_STOP=1 -f - ; then
                echo "::error::copy failed $tbl"; FAIL=1; continue; fi
              seq=$(dst -c "SELECT pg_get_serial_sequence('\"$tbl\"','id');" 2>/dev/null || echo "")
              if [ -n "$seq" ]; then
                dst -c "SELECT setval('$seq', COALESCE((SELECT MAX(id) FROM \"$tbl\"),1), true);" >/dev/null 2>&1 || true
              fi
              after=$(dst -c "SELECT COUNT(*) FROM \"$tbl\";" 2>/dev/null || echo "ERR")
            fi
            printf '%-22s | %12s | %12s | %12s\n' "$tbl" "$gcp" "$before" "$after"
            if [ "$WRITE" = "1" ] && [ "$gcp" != "$after" ]; then
              echo "::warning::parity mismatch on $tbl (gcp=$gcp rds=$after)"; fi
          done
          echo
          [ "$FAIL" = "0" ] && echo "All tables processed." || { echo "::error::one or more tables failed/missing"; exit 1; }

name: Rolling Walk-Forward Backtest

on:
  workflow_dispatch:
    inputs:
      start:
        description: 'Trade period start (YYYY-MM-DD)'
        required: false
        default: '2026-01-05'
      end:
        description: 'Trade period end (YYYY-MM-DD)'
        required: false
        default: '2026-03-31'
      label:
        description: 'Period label (e.g. "Q1 2026", "April 2026")'
        required: false
        default: 'Q1 2026'
      train_start:
        description: 'Training window floor (YYYY-MM-DD). Empty = earliest ML_LABELS.'
        required: false
        default: ''

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install psycopg2-binary numpy pandas python-dotenv lightgbm scikit-learn

      - name: Create .env file
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" > .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_BACKTEST_NAME=cp_backtest" >> .env
          SSLMODE="${{ secrets.DB_SSLMODE }}"
          [ -n "$SSLMODE" ] && echo "DB_SSLMODE=$SSLMODE" >> .env || true

      - name: Run rolling walk-forward backtest
        run: |
          TRAIN_START="${{ inputs.train_start }}"
          python scripts/q1_rolling_backtest.py \
            --start "${{ inputs.start }}" \
            --end "${{ inputs.end }}" \
            --label "${{ inputs.label }}" \
            ${TRAIN_START:+--train-start "$TRAIN_START"}

      - name: Upload results JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-results-${{ inputs.start }}-to-${{ inputs.end }}
          path: '*-backtest-results.json'
          retention-days: 90

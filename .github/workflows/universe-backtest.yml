name: Universe Expansion Backtest

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install psycopg2-binary numpy pandas python-dotenv

      - name: Create .env file
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" > .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_BACKTEST_NAME=cp_backtest" >> .env
          SSLMODE="${{ secrets.DB_SSLMODE }}"
          [ -n "$SSLMODE" ] && echo "DB_SSLMODE=$SSLMODE" >> .env || true

      - name: Export DB schema
        run: python scripts/db_schema_export.py

      - name: Upload schema JSON
        uses: actions/upload-artifact@v4
        with:
          name: db-schema
          path: src/trading/db_schema_full.json

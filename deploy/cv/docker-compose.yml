services:
  cv:
    # Prebuilt image in ECR (build once on a big box via deploy/build-push.sh,
    # then t3.small just pulls — the Next.js build needs ~8GB and OOMs on 2GB).
    image: 405633560616.dkr.ecr.us-east-1.amazonaws.com/cryptocurrency-cv:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # localhost only — never public
    environment:
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: "production"
      # GROQ_API_KEY intentionally empty — we do not use cv AI features
    # Override the image's HEALTHCHECK: cv bot-blocks by User-Agent, so the
    # built-in bare `wget --spider /api/health` self-BOT_BLOCKs and the
    # container reports (unhealthy) even though it is serving fine.
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - --header=User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36
        - --header=Sec-Fetch-Site: same-origin
        - http://localhost:3000/api/health
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - cv_redis:/data
volumes:
  cv_redis:
